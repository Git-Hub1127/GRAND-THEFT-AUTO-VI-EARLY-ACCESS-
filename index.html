<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRAND THEFT AUTO VI (EARLY ACCESS)</title>
    <!-- Tailwind CSS for rapid styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for a gaming look -->
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Grotesk:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: #0b0713;
            background-image: linear-gradient(180deg, #0b0713 0%, #1a0b2e 100%);
        }
        .gta-font {
            font-family: 'Orbitron', sans-serif;
        }
        .neon-border-pink {
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.5);
            border: 2px solid rgb(236, 72, 153);
        }
        .neon-text-cyan {
            text-shadow: 0 0 8px rgba(6, 182, 212, 0.6);
        }
    </style>
</head>
<body class="text-gray-100 min-h-screen pb-12">

    <!-- Header / Branding -->
    <header class="w-full bg-black/60 border-b-4 border-pink-500 py-6 text-center tracking-wider sticky top-0 z-50 backdrop-blur-md">
        <h1 class="gta-font text-3xl md:text-5xl font-black italic text-transparent bg-clip-text bg-gradient-to-r from-pink-500 via-purple-400 to-cyan-400 drop-shadow-lg">
            GRAND THEFT AUTO VI
        </h1>
        <div class="inline-block mt-2 bg-amber-500 text-black gta-font text-xs font-black px-3 py-1 rounded skew-x-12">
            EARLY ACCESS v0.69
        </div>
    </header>

    <main class="max-w-4xl mx-auto px-4 mt-8">
        
        <!-- HUD / Financial Stats -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
            <!-- Available Cash -->
            <div class="bg-black/40 border-2 border-cyan-500 p-6 rounded-xl backdrop-blur-sm relative overflow-hidden">
                <div class="absolute top-0 right-0 w-24 h-24 bg-cyan-500/10 rounded-full blur-2xl -mr-6 -mt-6"></div>
                <p class="text-xs uppercase tracking-widest text-cyan-400 font-bold">Safe House Stash (Balance)</p>
                <p id="total-balance" class="gta-font text-3xl font-black text-green-400 mt-2 neon-text-cyan">$0.00</p>
            </div>
            <!-- Income -->
            <div class="bg-black/40 border-2 border-green-500 p-6 rounded-xl backdrop-blur-sm">
                <p class="text-xs uppercase tracking-widest text-green-400 font-bold">Laundered Cash (Income)</p>
                <p id="total-income" class="gta-font text-3xl font-black text-emerald-400 mt-2">+$0.00</p>
            </div>
            <!-- Expenses -->
            <div class="bg-black/40 border-2 border-pink-500 p-6 rounded-xl backdrop-blur-sm">
                <p class="text-xs uppercase tracking-widest text-pink-400 font-bold">Heist Operations (Expenses)</p>
                <p id="total-expense" class="gta-font text-3xl font-black text-rose-500 mt-2">-$0.00</p>
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-5 gap-8">
            <!-- Form: Log Transaction -->
            <div class="md:col-span-2 bg-black/50 p-6 rounded-xl border border-purple-500/30 h-fit">
                <h3 class="gta-font text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-pink-400 to-cyan-400 mb-4 uppercase">
                    Log New Activity
                </h3>
                <form id="transaction-form" class="space-y-4">
                    <div>
                        <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1">Description / Job</label>
                        <input type="text" id="text" placeholder="e.g., Ammo Resupply, Club Earnings" required
                            class="w-full bg-purple-950/40 border border-purple-500/40 rounded p-2.5 text-white focus:outline-none focus:border-pink-500 transition-colors">
                    </div>
                    <div>
                        <label class="block text-xs uppercase tracking-wider text-gray-400 mb-1">Amount ($)</label>
                        <input type="number" step="0.01" id="amount" placeholder="Negative for expense, positive for income" required
                            class="w-full bg-purple-950/40 border border-purple-500/40 rounded p-2.5 text-white focus:outline-none focus:border-cyan-500 transition-colors">
                        <p class="text-[11px] text-purple-400 mt-1 italic">*Use minus (-) sign for expenses</p>
                    </div>
                    <button type="submit" 
                        class="w-full bg-gradient-to-r from-pink-600 to-purple-600 hover:from-pink-500 hover:to-purple-500 text-white font-bold py-3 px-4 rounded transition-all duration-200 uppercase tracking-widest gta-font border-b-4 border-pink-800 active:border-b-0 mt-2">
                        Execute Transaction
                    </button>
                </form>
            </div>

            <!-- List: History -->
            <div class="md:col-span-3 bg-black/50 p-6 rounded-xl border border-purple-500/30">
                <h3 class="gta-font text-xl font-bold text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 to-pink-400 mb-4 uppercase tracking-wider">
                    The Rap Sheet (History)
                </h3>
                <ul id="list" class="space-y-3 max-h-[400px] overflow-y-auto pr-2 custom-scrollbar">
                    <!-- Transactions injected here dynamically -->
                </ul>
            </div>
        </div>
    </main>

    <!-- App Logic script -->
    <script>
        const balance = document.getElementById('total-balance');
        const money_plus = document.getElementById('total-income');
        const money_minus = document.getElementById('total-expense');
        const list = document.getElementById('list');
        const form = document.getElementById('transaction-form');
        const text = document.getElementById('text');
        const amount = document.getElementById('amount');

        // Fetch data from local storage
        const localStorageTransactions = JSON.parse(localStorage.getItem('gta6_transactions'));
        let transactions = localStorage.getItem('gta6_transactions') !== null ? localStorageTransactions : [];

        // Add Transaction
        function addTransaction(e) {
            e.preventDefault();
            if (text.value.trim() === '' || amount.value.trim() === '') {
                alert('Please fill out the heist log properly.');
                return;
            }

            const transaction = {
                id: Math.floor(Math.random() * 100000000),
                text: text.value,
                amount: +amount.value
            };

            transactions.push(transaction);
            addTransactionDOM(transaction);
            updateValues();
            updateLocalStorage();

            text.value = '';
            amount.value = '';
        }

        // Display transaction in UI
        function addTransactionDOM(transaction) {
            const sign = transaction.amount < 0 ? '-' : '+';
            const item = document.createElement('li');
            
            // Apply unique colored left-borders depending on profit or loss
            const isExpense = transaction.amount < 0;
            const borderClass = isExpense ? 'border-r-4 border-pink-500 bg-pink-950/10' : 'border-r-4 border-emerald-500 bg-emerald-950/10';
            const textClass = isExpense ? 'text-rose-400' : 'text-emerald-400';

            item.className = `flex justify-between items-center bg-black/40 p-3 rounded border border-purple-900/40 ${borderClass} transition-all hover:bg-black/60`;
            
            item.innerHTML = `
                <div class="flex items-center gap-3">
                    <button onclick="removeTransaction(${transaction.id})" class="text-gray-500 hover:text-pink-500 font-bold transition-colors px-1 text-sm">✕</button>
                    <span class="font-medium tracking-wide">${transaction.text}</span>
                </div>
                <span class="gta-font font-bold ${textClass}">${sign}$${Math.abs(transaction.amount).toFixed(2)}</span>
            `;

            list.appendChild(item);
        }

        // Calculate and Update Totals
        function updateValues() {
            const amounts = transactions.map(t => t.amount);
            const total = amounts.reduce((acc, item) => (acc += item), 0).toFixed(2);
            
            const income = amounts
                .filter(item => item > 0)
                .reduce((acc, item) => (acc += item), 0)
                .toFixed(2);

            const expense = (
                amounts.filter(item => item < 0).reduce((acc, item) => (acc += item), 0) * -1
            ).toFixed(2);

            balance.innerText = `$${total}`;
            money_plus.innerText = `+$${income}`;
            money_minus.innerText = `-$${expense}`;
        }

        // Remove transaction
        function removeTransaction(id) {
            transactions = transactions.filter(t => t.id !== id);
            updateLocalStorage();
            init();
        }

        // Sync with LocalStorage
        function updateLocalStorage() {
            localStorage.setItem('gta6_transactions', JSON.stringify(transactions));
        }

        // Initialize App
        function init() {
            list.innerHTML = '';
            transactions.forEach(addTransactionDOM);
            updateValues();
        }

        init();
        form.addEventListener('submit', addTransaction);
    </script>
</body>
</html>
